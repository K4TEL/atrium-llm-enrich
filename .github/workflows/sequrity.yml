# .github/workflows/security.yml
# Thin caller for the centralised ATRIUM security + supply-chain reusable.
#
# Job split (controlled by the reusable):
#   version-check  — runs on every PR and push; verifies CITATION.cff version
#                    matches para_config.txt [tool] version (prefix-tolerant:
#                    "v0.1.0" in para_config.txt == "0.1.0" in CITATION.cff).
#   trivy-image    — runs on tag/release/schedule/dispatch only; scans the
#                    published GHCR image for CVEs.
#   sbom           — generates a CycloneDX SBOM alongside trivy.
#
# image-ref points at the :llm variant (torch/transformers/vLLM/bitsandbytes —
# the largest dependency surface and therefore the most CVE-relevant of the
# two published images). The lighter :remote image is not separately scanned
# here; add a second `security-remote` job with image-ref set to the
# ...-remote tag if that surface needs independent coverage.
#
# Prerequisites (infra, not code):
#   • GHCR package ghcr.io/ufal/atrium-llm-enrich-llm must be published & public
#     (or auth available) before the weekly Trivy scan can pull :latest.
#     PR runs are unaffected (image-scan is gated off PRs in the reusable).

name: Security & Supply-chain

on:
  push:
    branches: [test, main]
  pull_request:
    branches: [test, main]
  release:
    types: [published]
  schedule:
    # Weekly Monday 05:00 UTC
    - cron: '0 5 * * 1'
  workflow_dispatch:

jobs:
  security:
    permissions:
      contents: read
      packages: read
      security-events: write
      id-token: write
    uses: ufal/atrium-project/.github/workflows/security.reusable.yml@test
    secrets: inherit
    with:
      image-ref: ghcr.io/ufal/atrium-llm-enrich-llm:latest