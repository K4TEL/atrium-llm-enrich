# .github/workflows/release.yml
# Creates a GitHub Release with auto-generated notes when a v* tag is pushed.
#
# Notes-only variant: the two Docker images published to GHCR via docker.yml
# (:llm, :remote) are the canonical release artefacts.
#
# Suggested tagging workflow:
#   git tag -a v0.3.0 -m "v0.3.0 — DU code + to-MD convertors"
#   git push origin v0.3.0
#
# After the tag push, workflows fire in sequence:
#   1. docker.yml   — builds and pushes ghcr.io/ufal/atrium-llm-enrich-{remote,llm}:v0.3.0
#   2. release.yml  — creates the GitHub Release (this file)
#   3. security.yml — (scheduled/dispatch) Trivy-scans :latest after :v0.3.0 is live

name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  # ── Release gate ────────────────────────────────────────────────────────────
  # A mistagged push (tag != CITATION.cff != para_config.txt [tool] version)
  # fails HERE and blocks the release job below, so nothing gets published.
  # Same check as ufal/atrium-project security.reusable.yml's version-check, but
  # run INLINE inside release.yml on purpose: the guard must not depend on a
  # cross-repo `uses: …@test` resolving at tag-push time.
  version-guard:
    name: Verify tag == CITATION.cff == para_config.txt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Block release on version/tag mismatch
        env:
          CITATION_PATH: CITATION.cff
          # llm-enrich uses the default root para_config.txt
          PARA_PATH: para_config.txt
          TAG_REF: ${{ github.ref_name }}
        run: |
          python - <<'PY'
          import configparser, os, re, sys

          def citation_version(path):
              with open(path, encoding="utf-8") as fh:
                  for line in fh:
                      m = re.match(r'version:\s*["\']?v?([^"\'\s]+)', line)
                      if m:
                          return m.group(1)
              return None

          def paraconfig_version(path):
              cp = configparser.ConfigParser()
              cp.read(path, encoding="utf-8")
              v = cp.get("tool", "version", fallback=None)
              return v[1:] if v and v.lower().startswith("v") else v

          cit = citation_version(os.environ["CITATION_PATH"])
          para = paraconfig_version(os.environ["PARA_PATH"])
          tag = os.environ.get("TAG_REF", "")
          tag = tag[1:] if tag.lower().startswith("v") else tag
          print(f"tag={tag!r}  CITATION.cff={cit!r}  para_config={para!r}")

          errors = []
          if not tag:
              errors.append("no tag ref on this release event")
          if not cit:
              errors.append(f"could not parse version from {os.environ['CITATION_PATH']}")
          if not para:
              errors.append(f"could not parse [tool] version from {os.environ['PARA_PATH']}")
          if cit and para and cit != para:
              errors.append(f"version mismatch: CITATION.cff={cit} != para_config={para}")
          if tag and cit and tag != cit:
              errors.append(f"tag v{tag} != CITATION.cff {cit}")
          if tag and para and tag != para:
              errors.append(f"tag v{tag} != para_config {para}")

          for e in errors:
              print(f"::error::{e}")
          if errors:
              print("::error::Release blocked — make the pushed tag, CITATION.cff, and "
                    "para_config.txt [tool] version identical, then re-tag.")
          sys.exit(1 if errors else 0)
          PY

  release:
    name: Create GitHub Release
    needs: version-guard
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Create GitHub Release (notes only)
        uses: softprops/action-gh-release@v3
        with:
          generate_release_notes: true
          make_latest: true
