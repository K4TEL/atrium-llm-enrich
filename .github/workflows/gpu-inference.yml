# .github/workflows/gpu-inference.yml
# GPU inference integration tests — runs on a self-hosted GPU runner.
#
# INFRA-GATED: This job stays queued/inert until ARUP provides a self-hosted
# runner registered with the [self-hosted, gpu] labels (@rharasim, owner).
# It never blocks PRs (manual-dispatch + weekly only).
#
# When active it exercises the optional LLM inference path (llm_run.py,
# llm_utils.py) which requires requirements_llm.txt (torch, transformers,
# bitsandbytes, etc.).  The GPU runner must have CUDA drivers installed.
#
# HF_TOKEN: add as a repo/org secret if gated HF models (gemma, llama4) are
# exercised in the slow GPU test suite.

name: GPU Inference Tests

on:
  schedule:
    # Weekly Monday 03:00 UTC (off-peak for shared cluster)
    - cron: '0 3 * * 1'
  workflow_dispatch:

env:
  APT_PACKAGES: ""
  PRE_INSTALL_TORCH: ""
  REQUIREMENTS: "requirements.txt requirements-test.txt requirements_llm.txt"

jobs:
  gpu-inference:
    name: GPU slow tests
    runs-on: [self-hosted, gpu]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Set up Python 3.11
        uses: actions/setup-python@v7
        with:
          python-version: '3.11'

      - name: Install base + test + LLM dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt -r requirements-test.txt -r requirements_llm.txt

      - name: Run GPU/slow-marked tests (exit-5 tolerant)
        # Exit code 5 = "no tests collected" — tolerated until GPU slow tests
        # exist. `|| rc=$?` is required under the runner's `bash -e` shell.
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          rc=0
          python -m pytest -m slow -v --tb=short || rc=$?
          if [ "$rc" -eq 5 ]; then echo "[gpu] No slow tests collected — OK (infra ready)"; exit 0; fi
          exit $rc