# GPU override — combine with docker-compose.yaml:
#   docker compose -f docker-compose.yaml -f docker-compose.gpu.yaml --profile llm run --rm llm-enrich-llm
#
# Requires NVIDIA Container Toolkit on the host:
#   https://docs.nvidia.com/datacenter/cloud-native/container-toolkit/install-guide.html
#
# Only llm-enrich-llm is overridden here — llm-enrich-remote (OpenRouter/Ollama
# clients) never touches local GPU weights and has no service block in this file.

services:
  llm-enrich-llm:
    profiles: [llm]
    environment:
      NVIDIA_VISIBLE_DEVICES: all
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]