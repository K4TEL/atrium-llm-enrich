# .github/workflows/codeql.yml
# CodeQL static-analysis for Python.
# Pure-Python repo: build-mode: none — no compilation step required.
# Results surface in the Security tab; findings never block CI.
# Relevant surfaces here: openrouter_client.py / ollama_client.py make
# outbound HTTP calls with user-configurable hosts (OLLAMA_HOST) and handle
# API keys — CodeQL will flag SSRF / credential-handling patterns in that
# request layer.

name: CodeQL

on:
  push:
    branches: [test, main]
  pull_request:
    branches: [test, main]
  schedule:
    # Weekly Monday 06:00 UTC — avoids peak CI hours
    - cron: '0 6 * * 1'

jobs:
  analyze:
    name: Analyze (python)
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      actions: read
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: python
          build-mode: none

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4
        with:
          category: "/language:python"