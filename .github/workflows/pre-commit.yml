# .github/workflows/pre-commit.yml
# Advisory (non-blocking) pre-commit run against the full file tree.
#
# The pre-commit step carries continue-on-error: true — mirrors the
# "advisory first" policy used across the other ATRIUM tool repos. Findings
# are visible in the Actions tab but never turn a PR red.
#
# Hooks configured in .pre-commit-config.yaml (repo root):
#   • ruff (lint + format) — reads the repo's own ruff.toml
#   • shellcheck — present in the hook config for ecosystem consistency, but
#     this repo ships no *.sh files, so it is effectively a no-op here.

name: pre-commit

on:
  push:
    branches: [test, main]
  pull_request:
    branches: [test, main]

jobs:
  pre-commit:
    name: Lint (advisory)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Python 3.11
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Cache pre-commit environments
        uses: actions/cache@v4
        with:
          path: ~/.cache/pre-commit
          key: pre-commit-${{ runner.os }}-${{ hashFiles('.pre-commit-config.yaml') }}
          restore-keys: |
            pre-commit-${{ runner.os }}-

      - name: Run pre-commit (advisory — non-blocking)
        uses: pre-commit/action@v3.0.1
        continue-on-error: true