# .github/workflows/scheduled-smoke.yml
# Nightly smoke run against the full test suite (including slow-marked tests).
#
# Current state: atrium-llm-enrich has 0 tests marked @pytest.mark.slow (the
# suite so far covers llm_client_shared.py and api_util/xml_to_md.py, both
# pure-Python and network/GPU-free), so `pytest -m slow` exits with code 5
# ("no tests collected"). The run step tolerates exit 5 so the job stays
# green until slow tests are added.
#
# Follow-up: mark genuine network-integration tests (vocab_manager.py's live
# AMCR OAI-PMH harvest, a real OpenRouter/Ollama round-trip) @pytest.mark.slow
# to give this job real validation value.
#
# PARAM block (mirrors docker.yml build args for consistency):
#   REQUIREMENTS — base + remote-client deps only (no LLM/GPU stack — that
#                  lane is gpu-inference.yml on self-hosted runners).
#
# Infra note: this job runs on GitHub-hosted ubuntu-latest (CPU-only).

name: Scheduled Smoke Tests

on:
  schedule:
    # Weekly Monday 04:00 UTC
    - cron: '0 4 * * 1'
  workflow_dispatch:

env:
  REQUIREMENTS: "requirements.txt requirements_remote.txt"

jobs:
  smoke:
    name: Smoke (slow tests)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache pip
        uses: actions/cache@v6
        with:
          path: ~/.cache/pip
          key: pip-smoke-${{ runner.os }}-${{ hashFiles('requirements.txt', 'requirements_remote.txt') }}
          restore-keys: |
            pip-smoke-${{ runner.os }}-

      - name: Install dependencies
        run: |
          for req in ${{ env.REQUIREMENTS }}; do
            if [ -f "$req" ]; then pip install -r "$req"; fi
          done
          pip install pytest

      - name: Run slow-marked tests (exit-5 tolerant)
        # Exit code 5 = "no tests collected" — tolerated until @pytest.mark.slow
        # tests are added. Any other non-zero exit propagates as a genuine failure.
        run: |
          python -m pytest -m slow -v --tb=short
          rc=$?
          [ "$rc" -eq 5 ] && echo "[smoke] No slow tests collected — OK" && exit 0 || exit $rc