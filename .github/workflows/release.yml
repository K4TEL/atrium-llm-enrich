# .github/workflows/release.yml
# Creates a GitHub Release with auto-generated notes when a v* tag is pushed.
#
# Notes-only variant: the two Docker images published to GHCR via docker.yml
# (:llm, :remote) are the canonical release artefacts.
#
# Suggested tagging workflow:
#   git tag -a v0.1.0 -m "v0.1.0 — initial release"
#   git push origin v0.1.0
#
# After the tag push, workflows fire in sequence:
#   1. docker.yml   — builds and pushes ghcr.io/ufal/atrium-llm-enrich-{remote,llm}:v0.1.0
#   2. release.yml  — creates the GitHub Release (this file)
#   3. security.yml — (scheduled/dispatch) Trivy-scans :latest after :v0.1.0 is live

name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Create GitHub Release (notes only)
        uses: softprops/action-gh-release@v3
        with:
          generate_release_notes: true
          make_latest: true